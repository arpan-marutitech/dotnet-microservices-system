version: '3.8'

services:

  # 🗄️ SQL SERVER
  sqldb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1' | /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices-network

  # ⚡ REDIS
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microservices-network

  # 🐇 RABBITMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-network

  # 🔐 AUTH SERVICE
  authservice:
    build:
      context: ./AuthService
      dockerfile: AuthService.API/Dockerfile
    container_name: authservice
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      sqldb:
        condition: service_healthy
    networks:
      - microservices-network

  # 👤 USER SERVICE
  userservice:
    build:
      context: ./UserService
      dockerfile: UserService.API/Dockerfile
    container_name: userservice
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      sqldb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network

  # 📦 ORDER SERVICE
  orderservice:
    build:
      context: ./OrderService
      dockerfile: OrderService.API/Dockerfile
    container_name: orderservice
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      sqldb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network

  # 📢 NOTIFICATION SERVICE
  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notificationservice
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-network

  # 🚪 API GATEWAY
  apigateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: apigateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - authservice
      - userservice
      - orderservice
      - notificationservice
    networks:
      - microservices-network

volumes:
  sqlserver_data:

networks:
  microservices-network:
    driver: bridge