# ============================================================================
# LOGSTASH CONFIGURATION FOR .NET MICROSERVICES
# ============================================================================
# This configuration reads delimiter-based logs from UDP port 5000 and processes
# them before writing to Elasticsearch with proper indexing strategy.
# ============================================================================

input {
  # UDP input for Serilog structured logs
  udp {
    host => "0.0.0.0"
    port => 5000
    codec => plain
    type => "dotnet-log"
  }
}

filter {
  if [type] == "dotnet-log" {
    dissect {
      mapping => {
        "message" => "lvl=%{log_level}|svc=%{service_name}|env=%{environment}|msg=%{log_message}|props=%{properties_json}|ex=%{exception}"
      }
      tag_on_failure => [ "_udp_dissect_failure" ]
    }

    if [properties_json] and [properties_json] != "" and [properties_json] != "{}" {
      json {
        source => "properties_json"
        target => "properties"
        skip_on_invalid_json => true
      }
    }

    if [log_level] {
      mutate {
        lowercase => [ "log_level" ]
      }
    }

    if [service_name] {
      mutate {
        lowercase => [ "service_name" ]
      }
    }

    if [environment] {
      mutate {
        lowercase => [ "environment" ]
      }
    }

    # Extract correlation ID for tracing
    if [properties][CorrelationId] {
      mutate {
        copy => { "[properties][CorrelationId]" => "correlation_id" }
      }
    }

    # Extract request ID
    if [properties][RequestId] {
      mutate {
        copy => { "[properties][RequestId]" => "request_id" }
      }
    }

    # Extract request path
    if [properties][RequestPath] {
      mutate {
        copy => { "[properties][RequestPath]" => "request_path" }
      }
    }

    # Extract response status code
    if [properties][StatusCode] {
      mutate {
        copy => { "[properties][StatusCode]" => "status_code" }
      }
      mutate {
        convert => { "status_code" => "integer" }
      }
    }

    # Extract duration
    if [properties][Duration] {
      mutate {
        copy => { "[properties][Duration]" => "duration_ms" }
      }
      mutate {
        convert => { "duration_ms" => "integer" }
      }
    }

    # Extract user ID if available
    if [properties][UserId] {
      mutate {
        copy => { "[properties][UserId]" => "user_id" }
      }
    }

    # Extract exception details
    if [properties][ExceptionType] {
      mutate {
        copy => { "[properties][ExceptionType]" => "exception_type" }
      }
    }

    if [properties][ExceptionMessage] {
      mutate {
        copy => { "[properties][ExceptionMessage]" => "exception_message" }
      }
    }

    # Add host/container information
    if ![hostname] {
      mutate {
        add_field => { "hostname" => "%{[host][name]}" }
      }
    }

    # Set safe defaults because Logstash sprintf does not support :fallback syntax.
    if ![service_name] {
      mutate {
        add_field => { "service_name" => "unknown" }
      }
    }

    if ![environment] {
      mutate {
        add_field => { "environment" => "dev" }
      }
    }

    # Cleanup - remove unnecessary fields
    mutate {
      remove_field => [ "[host][mac]", "properties_json" ]
    }
  }
}

output {
  if [type] == "dotnet-log" {
    # Index naming strategy: app-logs-{service}-{environment}-{year.month.day}
    elasticsearch {
      hosts => [ "${ELASTICSEARCH_HOSTS:localhost:9200}" ]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:elastic123}"
      
      # Dynamic index naming based on service and environment
      index => "app-logs-%{service_name}-%{environment}-%{+YYYY.MM.dd}"
      
      # Connection settings
      ssl_certificate_verification => false
      
      # Retry policy
      retry_on_conflict => 3
      action => "index"
    }

    # Optional: Also send errors to a separate index for alerting
    if [log_level] in ["error", "fatal"] {
      elasticsearch {
        hosts => [ "${ELASTICSEARCH_HOSTS:localhost:9200}" ]
        user => "${ELASTICSEARCH_USERNAME:elastic}"
        password => "${ELASTICSEARCH_PASSWORD:elastic123}"
        
        index => "app-logs-errors-%{service_name}-%{environment}-%{+YYYY.MM.dd}"
        
        ssl_certificate_verification => false
      }
    }

    # Optional: Debug output to console (disable in production)
    if [@metadata][debug] {
      stdout {
        codec => rubydebug
      }
    }
  } else {
    # Fallback for non-dotnet logs
    elasticsearch {
      hosts => [ "${ELASTICSEARCH_HOSTS:localhost:9200}" ]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:elastic123}"
      
      index => "app-logs-other-%{+YYYY.MM.dd}"
      
      ssl_certificate_verification => false
    }
  }
}
